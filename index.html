<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Les Waddle à Sanary - du 27 mai au 3 juin</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>
    
    <style>
        /* Style d'origine pour les adresses privées */
        .adresse-brute {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-weight: bold;
            font-size: 13px;
            color: #2c3e50;
            white-space: nowrap;
            transform: translate(-50%, -50%);
            text-shadow: 
                -1px -1px 0 #fff,  
                 1px -1px 0 #fff,
                -1px  1px 0 #fff,
                 1px  1px 0 #fff; 
        }

        /* Style : Écritures 1,5 fois plus grandes et très grasses */
        .label-train-bleu {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-weight: 900;
            font-size: 20px;
            color: #4169E1;
            white-space: nowrap;
            transform: translate(-50%, -100%);
            text-shadow: 
                -2px -2px 0 #fff,  
                 2px -2px 0 #fff,
                -2px  2px 0 #fff,
                 2px  2px 0 #fff;
        }
    </style>
</head>

<body>

    <header>
        <h1>Les Waddle à Sanary - du 27 mai au 3 juin 2026</h1>
    </header>

    <div id="map"></div>

    <script>
        const map = L.map('map').setView([43.16, 5.72], 11);

        L.tileLayer(
            'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
            {
                attribution: '© OpenStreetMap'
            }
        ).addTo(map);

        // Fonction pour précharger une URL en arrière-plan
        function prechargerPage(url) {
            // Vérifie si le lien n'est pas déjà préchargé
            if (!document.querySelector(`link[href="${url}"]`)) {
                const lien = document.createElement('link');
                lien.rel = 'prefetch';
                lien.href = url;
                document.head.appendChild(lien);
            }
        }

        function ville(lat, lon, nom, dossier){
            const urlDestination = './slideshow.html?set=' + dossier;
            
            const marqueur = L.marker(
                [lat, lon],
                {
                    icon: L.divIcon({
                        className: 'custom-ville-marker', 
                        iconSize: null,                   
                        html: '<div class="ville-box">' + nom + '</div>'
                    })
                }
            ).addTo(map);

            // Au clic : on y va
            marqueur.on('click', function(){
                window.location.href = urlDestination;
            });

            // Au survol de la souris : on précharge la page en tâche de fond !
            marqueur.on('mouseover', function(){
                prechargerPage(urlDestination);
            });
        }

        function iconePrivee(lat, lon, icone, nom){
            L.marker(
                [lat, lon],
                {
                    icon: L.divIcon({
                        className: 'custom-ville-marker',
                        iconSize: null,
                        html: '<div class="adresse-brute">' + icone + ' ' + nom + '</div>'
                    })
                }
            )
            .addTo(map);
        }

        const urlGpx = 'train_bleu.gpx'; 

        new L.GPX(urlGpx, {
            async: true,
            marker_options: {
                startIconUrl: null, 
                endIconUrl: null,
                shadowUrl: null
            },
            polyline_options: {
                color: '#4169E1',   
                weight: 4.5,        
                opacity: 0.95,
                dashArray: '8, 6',  
                lineCap: 'round',
                lineJoin: 'round'
            }
        }).addTo(map);

        // Villes
        ville(43.356, 5.204, 'Ensuès-la-Redonne', 'ensueslaredonne');
        ville(43.296, 5.369, 'Marseille', 'marseille');
        ville(43.214, 5.539, 'Cassis', 'cassis');
        ville(43.174, 5.604, 'La Ciotat', 'laciotat');
        ville(43.176, 5.710, "La Cadière d'Azur", 'lacadieredazur');
        ville(43.200, 5.710, 'Le Castellet', 'lecastellet');
        ville(43.136, 5.750, 'Bandol', 'bandol');
        ville(43.118, 5.801, 'Sanary', 'sanary');
        ville(43.078, 5.878, 'Le Brusc', 'lebrusc');
        ville(43.098, 5.878, 'Saint Mandrier', 'saintmandrier');
        ville(43.033, 6.131, 'Giens', 'giens');
        ville(43.120, 6.128, 'Hyères', 'hyeres');

        // Hébergements
        iconePrivee(43.126, 5.775, '🏠', 'Edith et Jean-Luc');
        iconePrivee(43.121, 5.794, '🏨', 'Sue et Nigel');

        // Étiquette Train Bleu
        L.marker([43.337, 5.275], {
            icon: L.divIcon({
                className: 'custom-train-label',
                iconSize: null,
                html: '<div class="label-train-bleu">Train Bleu</div>'
            })
        }).addTo(map);
    </script>

<script data-goatcounter="https://waddle.goatcounter.com/count"
            async src="//gc.zgo.at/count.js"></script>

</body>
</html>
